# Bearch-WM Keybindings Configuration
# Hyprland keybindings

$mainMod = SUPER

# Application launchers
$mainMod + RETURN = exec, alacritty
$mainMod + D = exec, wofi --show drun
$mainMod + Q = killactive,
$mainMod + M = exit,
$mainMod + E = exec, nautilus
$mainMod + V = exec, wofi --show drun
$mainMod + P = pseudo,
$mainMod + J = togglesplit,

# Window focus
$mainMod + left = focus, l
$mainMod + right = focus, r
$mainMod + up = focus, u
$mainMod + down = focus, d

# Window movement
$mainMod + SHIFT + left = move, l
$mainMod + SHIFT + right = move, r
$mainMod + SHIFT + up = move, u
$mainMod + SHIFT + down = move, d

# Workspace switching
$mainMod + 1 = workspace, 1
$mainMod + 2 = workspace, 2
$mainMod + 3 = workspace, 3
$mainMod + 4 = workspace, 4
$mainMod + 5 = workspace, 5
$mainMod + 6 = workspace, 6
$mainMod + 7 = workspace, 7
$mainMod + 8 = workspace, 8
$mainMod + 9 = workspace, 9
$mainMod + 0 = workspace, 10

# Move window to workspace
$mainMod + SHIFT + 1 = movetoworkspace, 1
$mainMod + SHIFT + 2 = movetoworkspace, 2
$mainMod + SHIFT + 3 = movetoworkspace, 3
$mainMod + SHIFT + 4 = movetoworkspace, 4
$mainMod + SHIFT + 5 = movetoworkspace, 5
$mainMod + SHIFT + 6 = movetoworkspace, 6
$mainMod + SHIFT + 7 = movetoworkspace, 7
$mainMod + SHIFT + 8 = movetoworkspace, 8
$mainMod + SHIFT + 9 = movetoworkspace, 9
$mainMod + SHIFT + 0 = movetoworkspace, 10

# Special workspace (scratchpad)
$mainMod + S = togglespecialworkspace, magic
$mainMod + SHIFT + S = movetoworkspace, special:magic

# Scroll through workspaces
$mainMod + mouse_down = workspace, e+1
$mainMod + mouse_up = workspace, e-1

# Window resizing
$mainMod + CTRL + left = resizeactive, -50 0
$mainMod + CTRL + right = resizeactive, 50 0
$mainMod + CTRL + up = resizeactive, 0 -50
$mainMod + CTRL + down = resizeactive, 0 50

# Media controls
XF86AudioPlay = exec, playerctl play-pause
XF86AudioPause = exec, playerctl play-pause
XF86AudioNext = exec, playerctl next
XF86AudioPrev = exec, playerctl previous
XF86AudioStop = exec, playerctl stop

# Volume controls
XF86AudioRaiseVolume = exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
XF86AudioLowerVolume = exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
XF86AudioMute = exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
XF86AudioMicMute = exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls
XF86MonBrightnessUp = exec, brightnessctl set +5%
XF86MonBrightnessDown = exec, brightnessctl set 5%-

# Screenshot
$mainMod + PRINT = exec, grim -g "$(slurp)" - | wl-copy
$mainMod + SHIFT + PRINT = exec, grim - | wl-copy

# System controls
$mainMod + L = exec, swaylock -f
$mainMod + SHIFT + R = exec, hyprctl reload
$mainMod + SHIFT + E = exec, wlogout
$mainMod + SHIFT + P = exec, systemctl suspend

# Application shortcuts
$mainMod + B = exec, blueman-manager
$mainMod + N = exec, networkmanager_dmenu
$mainMod + T = exec, pavucontrol
