# Bearch-WM Hyprland Configuration
# Generated for BerkeOS

# Monitor configuration
monitor=,preferred,auto,1

# Input configuration
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }

    sensitivity = 0
}

# General window configuration
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(5fa6d3aa) rgba(3a8adbff) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    resize_on_border = true
}

# Decoration settings
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    shadow_offset = 0 2

    dim_inactive = false
    dim_strength = 0.1
}

# Animation settings
animations {
    enabled = true
    bezier = easeInOut,0.4,0.02,0.21
    bezier = myBezier,0.05,0.9,0.1,1.05
    bezier = overshot,0.13,0.99,0.29,1.1

    animation = windows,1,7,easeInOut
    animation = windowsOut,1,7,default,popin 80%
    animation = border,1,10,default
    animation = borderangle,1,8,default
    animation = fade,1,7,easeInOut
    animation = workspaces,1,6,default
}

# Layout settings
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    split_width_multiplier = 1.0
    no_gaps_when_only = false
}

# Miscellaneous settings
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Cursor settings
cursor {
    no_hardware_cursors = false
    hide_on_key_press = false
}

# XWayland configuration
xwayland {
    force_zero_scaling = true
}

# Layer rules
layerrule = blur,waybar
layerrule = ignorezero,waybar

# Window rules
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(blueman-manager)$

# Workspace rules
workspace = 1, monitor:0, default:true
workspace = 2, monitor:0
workspace = 3, monitor:0
workspace = 4, monitor:0
workspace = 5, monitor:0

# Include keybindings
source = ~/.config/hypr/keybindings.conf
